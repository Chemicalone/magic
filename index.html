<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Magia Elementale</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #04040a;
  color: rgba(255,255,255,0.9);
  font-family: 'Cinzel', serif;
  overflow: hidden;
  height: 100vh; width: 100vw;
  user-select: none; -webkit-user-select: none;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 999; opacity: 0.5;
}
#effectCanvas { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
#drawCanvas   { position: fixed; inset: 0; z-index: 2; cursor: crosshair; touch-action: none; }
#topBar {
  position: fixed; top: 0; left: 0; right: 0;
  padding: 20px 20px 12px; z-index: 10;
  pointer-events: none;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
#title {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(0.75em, 2.5vw, 1.1em);
  letter-spacing: 0.35em; color: rgba(255,255,255,0.18); text-transform: uppercase;
}
#status {
  font-size: clamp(0.65em, 2vw, 0.85em);
  letter-spacing: 0.18em; color: rgba(255,255,255,0.55);
  text-align: center; min-height: 1.3em; transition: color 0.4s ease;
}
#status.error { color: rgba(255,100,80,0.9); }
#elementBadge {
  display: flex; align-items: center; gap: 12px;
  padding: 7px 22px; border-radius: 40px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(12px);
  transition: all 0.5s cubic-bezier(0.34,1.56,0.64,1);
  opacity: 0; transform: translateY(-8px) scale(0.95);
}
#elementBadge.visible { opacity: 1; transform: translateY(0) scale(1); }
#elementIcon { font-size: 1.3em; }
#elementNameEl { font-size: 0.9em; letter-spacing: 0.3em; font-weight: 700; }
#resultOverlay {
  position: fixed; inset: 0; z-index: 8;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  pointer-events: none; opacity: 0; transition: opacity 0.7s ease;
}
#resultOverlay.visible { opacity: 1; }
#resultMain {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(2.8em, 11vw, 6.5em); font-weight: 700;
  letter-spacing: 0.08em; text-align: center; line-height: 1;
  animation: glowPulse 2.2s ease-in-out infinite;
}
#resultSub {
  font-size: clamp(0.6em, 1.8vw, 0.88em);
  letter-spacing: 0.5em; opacity: 0.65; margin-top: 18px; text-align: center;
}
@keyframes glowPulse {
  0%,100% { text-shadow: 0 0 30px currentColor, 0 0 70px currentColor; }
  50%      { text-shadow: 0 0 50px currentColor, 0 0 110px currentColor, 0 0 15px #fff; }
}
#bottomBar {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 14px 20px 20px; z-index: 10;
  display: flex; justify-content: space-between; align-items: flex-end;
}
#legend { pointer-events: none; display: flex; flex-direction: column; gap: 5px; }
.leg {
  font-size: clamp(0.48em, 1.4vw, 0.62em); letter-spacing: 0.1em;
  color: rgba(255,255,255,0.22); display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}
.leg span { color: rgba(255,255,255,0.38); }
#clearBtn {
  background: none; border: 1px solid rgba(255,255,255,0.14);
  color: rgba(255,255,255,0.35); padding: 9px 18px; border-radius: 30px;
  cursor: pointer; font-family: 'Cinzel', serif;
  font-size: clamp(0.55em, 1.5vw, 0.7em); letter-spacing: 0.22em; transition: all 0.25s;
}
#clearBtn:hover, #clearBtn:active { border-color: rgba(255,255,255,0.38); color: rgba(255,255,255,0.8); }
#tapHint {
  position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%);
  font-size: clamp(0.5em, 1.4vw, 0.62em); letter-spacing: 0.3em;
  color: rgba(255,255,255,0.28); z-index: 10; pointer-events: none;
  opacity: 0; text-align: center; white-space: nowrap;
}
#tapHint.show { animation: hintFade 4s ease 1.2s forwards; }
@keyframes hintFade { 0%{opacity:0} 25%{opacity:1} 80%{opacity:1} 100%{opacity:0.3} }
</style>
</head>
<body>
<canvas id="effectCanvas"></canvas>
<canvas id="drawCanvas"></canvas>
<div id="topBar">
  <div id="title">Magia Elementale</div>
  <div id="status">Disegna il simbolo di un elemento</div>
  <div id="elementBadge"><span id="elementIcon"></span><span id="elementNameEl"></span><span id="comboChain" style="font-size:0.8em;letter-spacing:0.15em;opacity:0.7;margin-left:4px;"></span></div>
</div>
<div id="resultOverlay"><div id="resultMain"></div><div id="resultSub"></div></div>
<div id="tapHint">✦ tocca per ricominciare ✦</div>

<div id="bottomBar">
  <button id="clearBtn">↺ RESET</button>
</div>

<script>
// ─── Definizioni ──────────────────────────────────────────────────────────────
const ELEMENTS = {
  LUCE:     { icon:'✕', color:'#FFE566', glow:[255,220,80],  name:'LUCE' },
  OMBRA:    { icon:'∞', color:'#B46EFF', glow:[150,80,230],  name:'OMBRA' },
  FUOCO:    { icon:'🔥', color:'#FF6830', glow:[255,95,40],   name:'FUOCO' },
  GHIACCIO: { icon:'❄', color:'#7DDEFF', glow:[100,200,255], name:'GHIACCIO' },
  ARIA:     { icon:'〜', color:'#6FFFBA', glow:[90,255,170],  name:'ARIA' },
  ERBA:     { icon:'🌿', color:'#5FE644', glow:[80,210,60],   name:'ERBA' },
};
const MODE_LABELS = { SFERA:'Sfera', VERTICALE:'Raggio Verticale', DIAGONALE:'Raggio Diagonale', ORIZZONTALE:'Raggio Orizzontale' };

// ─── Combo ────────────────────────────────────────────────────────────────────
const COMBOS = [
  { elements:['FUOCO','GHIACCIO'],                    name:'ACQUA',    color:'#4FC3F7', glow:[50,180,255],   desc:'Il fuoco incontra il ghiaccio' },
  { elements:['OMBRA','ARIA'],                         name:'FUMOGENA', color:'#9E9E9E', glow:[160,160,180],  desc:'Oscurità e vento si fondono' },
  { elements:['FUOCO','ARIA'],                         name:'FULMINE',  color:'#FFF176', glow:[255,240,100],  desc:'Calore e vento generano scarica' },
  { elements:['ERBA','GHIACCIO','FUOCO'],              name:'FANGO',    color:'#8D6E63', glow:[140,100,80],   desc:'Terra, ghiaccio e fuoco si mescolano' },
  { elements:['ERBA','GHIACCIO','FUOCO','FUOCO'],      name:'ROCCIA',   color:'#B0BEC5', glow:[160,175,185],  desc:'La terra si solidifica' },
  { elements:['ERBA','GHIACCIO','FUOCO','FUOCO','FUOCO'], name:'LAVA',  color:'#FF5722', glow:[255,80,20],    desc:'La roccia fonde in magma ardente' },
];
COMBOS.forEach(c => { c._key = [...c.elements].sort().join(','); });
function matchCombo(elArr) {
  const k = [...elArr].sort().join(',');
  return COMBOS.find(c => c._key === k) || null;
}

// ─── Canvas ───────────────────────────────────────────────────────────────────
const drawCanvas   = document.getElementById('drawCanvas');
const effectCanvas = document.getElementById('effectCanvas');
const dctx = drawCanvas.getContext('2d');
const ectx = effectCanvas.getContext('2d');

function resize() {
  [drawCanvas, effectCanvas].forEach(c => { c.width = window.innerWidth; c.height = window.innerHeight; });
}
resize();
window.addEventListener('resize', resize);

// ─── Disegno ──────────────────────────────────────────────────────────────────
let drawing=false, hasDrawn=false, drawTimer=null;
let allPoints = [];    // tutti i punti concatenati (per riconoscimenti single-stroke)
let allStrokes = [];   // array di array — ogni tratto separato
let currentStroke = [];

function applyStrokeStyle(hex) {
  dctx.strokeStyle=hex; dctx.shadowColor=hex; dctx.shadowBlur=14;
  dctx.lineWidth=3; dctx.lineCap='round'; dctx.lineJoin='round';
}
applyStrokeStyle('rgba(255,255,255,0.92)');

function pos(e) {
  const r = drawCanvas.getBoundingClientRect();
  return e.touches && e.touches.length
    ? { x:e.touches[0].clientX-r.left, y:e.touches[0].clientY-r.top }
    : { x:e.clientX-r.left, y:e.clientY-r.top };
}

function onStart(e) {
  if (appState==='SHOWING') return;
  e.preventDefault();
  drawing=true; hasDrawn=true;
  currentStroke = [];
  const p=pos(e);
  currentStroke.push({x:p.x, y:p.y});
  allPoints.push({x:p.x, y:p.y});
  dctx.beginPath(); dctx.moveTo(p.x,p.y);
  clearTimeout(drawTimer);
}
function onMove(e) {
  if (!drawing||appState==='SHOWING') return;
  e.preventDefault();
  const p=pos(e);
  currentStroke.push({x:p.x, y:p.y});
  allPoints.push({x:p.x, y:p.y});
  dctx.lineTo(p.x,p.y); dctx.stroke();
  dctx.beginPath(); dctx.moveTo(p.x,p.y);
}
function onEnd(e) {
  if (!drawing) return;
  e.preventDefault(); drawing=false; dctx.beginPath();
  if (currentStroke.length > 2) allStrokes.push([...currentStroke]);
  currentStroke = [];
  clearTimeout(drawTimer);
  if (hasDrawn && appState!=='SHOWING') drawTimer=setTimeout(recognizeShape, 900);
}

drawCanvas.addEventListener('mousedown',  onStart);
drawCanvas.addEventListener('mousemove',  onMove);
drawCanvas.addEventListener('mouseup',    onEnd);
drawCanvas.addEventListener('mouseleave', onEnd);
drawCanvas.addEventListener('touchstart', onStart, {passive:false});
drawCanvas.addEventListener('touchmove',  onMove,  {passive:false});
drawCanvas.addEventListener('touchend',   onEnd,   {passive:false});

// ─── Stato app ────────────────────────────────────────────────────────────────
let appState='WAITING_ELEMENT', detectedElement=null, animId=null;
let comboChain = [];   // elementi accumulati finora

const statusEl      = document.getElementById('status');
const badgeEl       = document.getElementById('elementBadge');
const iconEl        = document.getElementById('elementIcon');
const nameEl        = document.getElementById('elementNameEl');
const comboChainEl  = document.getElementById('comboChain');
const clearBtn      = document.getElementById('clearBtn');
const resultMain    = document.getElementById('resultMain');
const resultSub     = document.getElementById('resultSub');
const tapHint       = document.getElementById('tapHint');


// ─── RICONOSCIMENTO GEOMETRICO ────────────────────────────────────────────────

function getStats(pts) {
  if (!pts.length) return null;
  const xs = pts.map(p=>p.x), ys = pts.map(p=>p.y);
  const minX=Math.min(...xs), maxX=Math.max(...xs);
  const minY=Math.min(...ys), maxY=Math.max(...ys);
  const cx=(minX+maxX)/2, cy=(minY+maxY)/2;
  const w=maxX-minX, h=maxY-minY;
  const diag=Math.hypot(w,h);

  // Distanza media dal centro
  const dists = pts.map(p=>Math.hypot(p.x-cx,p.y-cy));
  const avgDist = dists.reduce((a,b)=>a+b,0)/dists.length;
  const maxDist = Math.max(...dists);
  // Circolarità: quanto è uniforme la distanza dal centro
  const distStd = Math.sqrt(dists.map(d=>(d-avgDist)**2).reduce((a,b)=>a+b,0)/dists.length);
  const circularity = distStd / (avgDist||1);

  // Angolo totale percorso
  let totalAngle = 0;
  for (let i=1; i<pts.length-1; i++) {
    const a1 = Math.atan2(pts[i].y-pts[i-1].y, pts[i].x-pts[i-1].x);
    const a2 = Math.atan2(pts[i+1].y-pts[i].y, pts[i+1].x-pts[i].x);
    let da = a2-a1;
    while(da> Math.PI) da-=2*Math.PI;
    while(da<-Math.PI) da+=2*Math.PI;
    totalAngle += da;
  }

  // Conteggio inversioni verticali (per onde)
  let waveCount = 0;
  let lastDir = 0;
  for (let i=1; i<pts.length; i++) {
    const dy = pts[i].y - pts[i-1].y;
    const dir = dy > 1 ? 1 : dy < -1 ? -1 : 0;
    if (dir !== 0 && dir !== lastDir && lastDir !== 0) waveCount++;
    if (dir !== 0) lastDir = dir;
  }

  // Ampiezza verticale media per "passo" orizzontale (per distinguere zigzag da onde)
  // Calcola l'ampiezza media degli up-down
  let ampSum = 0, ampCount = 0;
  let lastExtremeY = pts[0].y, lastDir2 = 0;
  for (let i=1; i<pts.length; i++) {
    const dy = pts[i].y - pts[i-1].y;
    const dir = dy > 1 ? 1 : dy < -1 ? -1 : 0;
    if (dir !== 0 && dir !== lastDir2 && lastDir2 !== 0) {
      ampSum += Math.abs(pts[i].y - lastExtremeY);
      ampCount++;
      lastExtremeY = pts[i].y;
    }
    if (dir !== 0) lastDir2 = dir;
  }
  const avgAmp = ampCount > 0 ? ampSum / ampCount : 0;

  // Conteggio cambi di direzione bruschi (>80°)
  let sharpTurns = 0;
  for (let i=2; i<pts.length; i++) {
    const a1 = Math.atan2(pts[i-1].y-pts[i-2].y, pts[i-1].x-pts[i-2].x);
    const a2 = Math.atan2(pts[i].y-pts[i-1].y,   pts[i].x-pts[i-1].x);
    let da = Math.abs(a2-a1);
    if (da>Math.PI) da=2*Math.PI-da;
    if (da > 1.4) sharpTurns++;
  }
  const sharpRate = sharpTurns / (pts.length||1);

  // Distanza primo-ultimo punto (chiusura)
  const closure = Math.hypot(pts[pts.length-1].x-pts[0].x, pts[pts.length-1].y-pts[0].y);
  const closureRatio = closure / (diag||1);

  // Angolo dominante (per linee)
  const mainAngle = Math.atan2(pts[pts.length-1].y-pts[0].y, pts[pts.length-1].x-pts[0].x);
  const absAngle  = Math.abs(mainAngle);

  // Aspect ratio
  const aspect = w / (h||1);

  // Lunghezza totale del tratto
  let pathLen = 0;
  for(let i=1;i<pts.length;i++) pathLen+=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y);

  return { w, h, cx, cy, diag, circularity, totalAngle, waveCount, avgAmp, closureRatio, mainAngle, absAngle, aspect, sharpRate, pathLen, avgDist };
}

// ─── FEATURE AGGIUNTIVE (calcolate sui punti raw) ────────────────────────────

function getExtraFeatures(pts) {
  // sharpRate: % di punti con cambio angolo > 80°
  let sharpTurns = 0;
  for (let i=2; i<pts.length; i++) {
    const a1 = Math.atan2(pts[i-1].y-pts[i-2].y, pts[i-1].x-pts[i-2].x);
    const a2 = Math.atan2(pts[i].y-pts[i-1].y,   pts[i].x-pts[i-1].x);
    let da = Math.abs(a2-a1);
    if (da>Math.PI) da=2*Math.PI-da;
    if (da > 1.4) sharpTurns++;
  }
  const sharpRate = sharpTurns / (pts.length||1);

  // waveCount: inversioni verticali nette (threshold 2px)
  let waveCount = 0, lastDir = 0;
  for (let i=1; i<pts.length; i++) {
    const dy = pts[i].y - pts[i-1].y;
    const dir = dy > 2 ? 1 : dy < -2 ? -1 : 0;
    if (dir !== 0 && dir !== lastDir && lastDir !== 0) waveCount++;
    if (dir !== 0) lastDir = dir;
  }

  // hRevCount: inversioni orizzontali (il tratto torna indietro)
  let hRevCount = 0, lastHDir = 0;
  for (let i=1; i<pts.length; i++) {
    const dx = pts[i].x - pts[i-1].x;
    const dir = dx > 2 ? 1 : dx < -2 ? -1 : 0;
    if (dir !== 0 && dir !== lastHDir && lastHDir !== 0) hRevCount++;
    if (dir !== 0) lastHDir = dir;
  }

  return { sharpRate, waveCount, hRevCount };
}

function showDebug() {}

// ─── RICONOSCIMENTO ────────────────────────────────────────────────────────────

function recognizeElement(pts) {
  if (pts.length < 10) return null;
  const s = getStats(pts);
  const ex = getExtraFeatures(pts);
  if (!s) return null;

  const abs = Math.abs(s.totalAngle);
  const scores = {};

  // ── OMBRA ∞ ──
  // Caratteristica UNICA: pathLen molto > diag + inversioni orizzontali (il tratto torna su se stesso)
  // L'infinito fa: →curve→ poi ←curve← → il tratto è >2× la diagonale e inverte direzione x
  if (abs > 7 && s.pathLen > s.diag * 1.8 && ex.hRevCount >= 1) {
    scores.OMBRA = 30 + abs + ex.hRevCount * 3;
  }

  // ── GHIACCIO □ ──
  // Tratto CHIUSO + angoli NETTI (sharpRate > 0.008) + totalAngle < 6 (non è un cerchio completo)
  if (s.closureRatio < 0.28 && s.aspect > 0.4 && s.aspect < 2.5 && ex.sharpRate > 0.008 && abs < 6.5) {
    scores.GHIACCIO = 25 + (0.28 - s.closureRatio) * 40 + ex.sharpRate * 500 - Math.abs(s.aspect - 1) * 2;
  }

  // ── LUCE ✕ (X — uno o due tratti diagonali che si incrociano) ──
  // Supporta sia 2 tratti separati sia 1 tratto continuo a V/X
  {
    const angleOf = (stroke) => {
      const s = stroke[0], e = stroke[stroke.length-1];
      return Math.atan2(e.y - s.y, e.x - s.x);
    };

    // ── Caso 1: 2 tratti separati ──
    if (allStrokes.length === 2) {
      const a1 = angleOf(allStrokes[0]);
      const a2 = angleOf(allStrokes[1]);
      let diff = Math.abs(a1 - a2);
      if (diff > Math.PI) diff = 2 * Math.PI - diff;
      const deg1 = Math.abs(a1) * 180 / Math.PI;
      const deg2 = Math.abs(a2) * 180 / Math.PI;
      const diag1 = (deg1 > 15 && deg1 < 165);
      const diag2 = (deg2 > 15 && deg2 < 165);
      const diffDeg = diff * 180 / Math.PI;
      ex.xDiff = diffDeg;
      // Tolleranza ampliata: 45°–135°
      if (diffDeg > 45 && diffDeg < 135 && diag1 && diag2) {
        scores.LUCE = 35 + (90 - Math.abs(diffDeg - 90)) * 0.5;
      }
    }

    // ── Caso 2: tratto continuo a X (cambio brusco di direzione nel mezzo) ──
    // Individua il punto di svolta principale e verifica che le due metà
    // abbiano direzioni quasi perpendicolari e che il punto di svolta
    // sia vicino al centro del bounding box (croce/X, non V)
    if (allStrokes.length === 1 && pts.length >= 16) {
      const half = Math.floor(pts.length / 2);
      // Trova l'angolo brusco massimo nella metà centrale del tratto
      let bestTurnIdx = -1, bestTurnAngle = 0;
      const margin = Math.floor(pts.length * 0.2);
      for (let i = margin; i < pts.length - margin; i++) {
        const a1 = Math.atan2(pts[i].y - pts[i-1].y, pts[i].x - pts[i-1].x);
        const a2 = Math.atan2(pts[Math.min(i+1,pts.length-1)].y - pts[i].y,
                              pts[Math.min(i+1,pts.length-1)].x - pts[i].x);
        let da = Math.abs(a2 - a1);
        if (da > Math.PI) da = 2 * Math.PI - da;
        if (da > bestTurnAngle) { bestTurnAngle = da; bestTurnIdx = i; }
      }
      if (bestTurnIdx > 0 && bestTurnAngle > 0.8) {
        const seg1 = pts.slice(0, bestTurnIdx);
        const seg2 = pts.slice(bestTurnIdx);
        const a1 = angleOf(seg1);
        const a2 = angleOf(seg2);
        let diff = Math.abs(a1 - a2);
        if (diff > Math.PI) diff = 2 * Math.PI - diff;
        const diffDeg = diff * 180 / Math.PI;
        const deg1 = Math.abs(a1) * 180 / Math.PI;
        const deg2 = Math.abs(a2) * 180 / Math.PI;
        const diag1 = (deg1 > 15 && deg1 < 165);
        const diag2 = (deg2 > 15 && deg2 < 165);
        ex.xDiff = diffDeg;
        ex.xDiff1Stroke = true;
        if (diffDeg > 45 && diffDeg < 135 && diag1 && diag2) {
          scores.LUCE = 30 + (90 - Math.abs(diffDeg - 90)) * 0.4;
        }
      }
    }

    if (ex.xDiff === undefined) ex.xDiff = -1;
  }

  // ── ERBA ⌇ ──
  // Caratteristica: orizzontale + inversioni verticali + angoli NETTI (sharpRate alto)
  // Si distingue da ARIA: sharpRate più alto
  // Si distingue da LUCE: è orizzontale (aspect > 1.3) e waveCount alto
  if (s.aspect > 1.3 && ex.waveCount >= 2 && ex.sharpRate > 0.012) {
    scores.ERBA = 18 + ex.waveCount * 2 + ex.sharpRate * 300;
  }

  // ── ARIA 〜 ──
  // Caratteristica: orizzontale + inversioni verticali + angoli MORBIDI (sharpRate basso)
  if (s.aspect > 1.4 && ex.waveCount >= 3 && ex.sharpRate < 0.016) {
    scores.ARIA = 18 + ex.waveCount * 2 + (0.016 - ex.sharpRate) * 1000;
  }

  // ── FUOCO 🔥 ──
  // Caratteristica UNICA: bounding box PIÙ ALTA che larga (aspect < 0.75)
  // Nessun altro simbolo è verticale
  if (s.aspect < 0.75 && s.closureRatio > 0.1 && abs > 1.5) {
    scores.FUOCO = 22 + (0.75 - s.aspect) * 20 + abs;
  }

  showDebug(s, ex, scores);

  if (!Object.keys(scores).length) return null;
  return Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
}

function recognizeMode(pts) {
  if (pts.length < 5) return null;
  const s = getStats(pts);
  const ex = getExtraFeatures(pts);
  if (!s) return null;

  const abs = Math.abs(s.totalAngle);
  const straight = s.diag / (s.pathLen||1);

  // Mostra le stats nel debug anche per il modo
  showDebug(s, ex, { 'straight×10': straight*10, 'circularity×10': s.circularity*10, '|totAngle|': abs });

  // ── SFERA ○ ──
  // Cerchio: fluido (sharpRate basso), chiuso, totalAngle alto (≈2π)
  if (s.circularity < 0.40 && s.closureRatio < 0.50 && abs > 3.5 && ex.sharpRate < 0.008) {
    return 'SFERA';
  }

  // ── Linee rette ──
  if (straight > 0.48) {
    const deg = Math.abs(s.mainAngle) * 180 / Math.PI;
    if (deg < 28 || deg > 152)  return 'ORIZZONTALE';
    if (deg > 62 && deg < 118)  return 'VERTICALE';
    return 'DIAGONALE';
  }

  // Fallback curvo → SFERA
  if (s.closureRatio < 0.55 && abs > 2.5) return 'SFERA';

  const deg = Math.abs(s.mainAngle) * 180 / Math.PI;
  if (deg < 28 || deg > 152) return 'ORIZZONTALE';
  if (deg > 62 && deg < 118) return 'VERTICALE';
  return 'DIAGONALE';
}

// Combo che non possono ricevere altri elementi (complete e non espandibili)
const LOCKED_COMBOS = ['ACQUA', 'FUMOGENA', 'FULMINE', 'LAVA'];

function isComboLocked() {
  const combo = matchCombo(comboChain);
  return combo && LOCKED_COMBOS.includes(combo.name);
}

// Controlla se aggiungere `el` alla catena attuale può ancora portare a una combo valida
function isElementCompatible(el) {
  const tentative = [...comboChain, el].sort().join(',');
  return COMBOS.some(c => c._key.startsWith(tentative) || c._key === tentative);
}

// Effetto "rifiuto": il tratto diventa rosso e svanisce
function flashRejected() {
  applyStrokeStyle('rgba(255,60,60,0.9)');
  setTimeout(() => {
    dctx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
    allPoints = []; allStrokes = [];
    // Ripristina il colore dell'ultimo elemento valido
    if (detectedElement) applyStrokeStyle(ELEMENTS[detectedElement].color);
    else applyStrokeStyle('rgba(255,255,255,0.92)');
  }, 350);
}

// ─── Riconoscimento principale ────────────────────────────────────────────────
function updateBadge() {
  if (comboChain.length === 0) { badgeEl.classList.remove('visible'); return; }
  const last = ELEMENTS[comboChain[comboChain.length-1]];
  iconEl.textContent  = last.icon;
  nameEl.textContent  = last.name;
  nameEl.style.color  = last.color;
  badgeEl.style.borderColor = last.color+'55';
  // mostra la catena precedente come icone
  if (comboChain.length > 1) {
    comboChainEl.textContent = comboChain.slice(0,-1).map(e=>ELEMENTS[e].icon).join(' ') + ' +';
  } else {
    comboChainEl.textContent = '';
  }
  badgeEl.classList.add('visible');
}

function recognizeShape() {
  if (!allPoints.length) return;

  if (appState === 'WAITING_ELEMENT') {
    // Prima prova a vedere se è un elemento
    const el = recognizeElement(allPoints);
    if (el && ELEMENTS[el]) {
      comboChain.push(el);
      detectedElement = el;
      appState = 'WAITING_MODE_OR_ELEMENT';
      applyStrokeStyle(ELEMENTS[el].color);
      updateBadge();
      // Controlla se la combo attuale è già bloccata o espandibile
      if (isComboLocked()) {
        setStatus('Casta la magia  ○ |  /  —', false);
      } else {
        setStatus('Aggiungi un altro elemento o casta  ○ |  /  —', false);
      }
      setTimeout(() => {
        dctx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
        allPoints = []; allStrokes = [];
      }, 350);
      hasDrawn = false;
      return;
    }
    // Non è un elemento: simbolo non riconosciuto
    setStatus('Simbolo non riconosciuto — riprova', true);
    setTimeout(() => setStatus('Disegna il simbolo di un elemento', false), 2200);
    allPoints = []; allStrokes = [];
    hasDrawn = false;

  } else if (appState === 'WAITING_MODE_OR_ELEMENT') {
    // Se la combo è bloccata accetta solo il modo di cast
    if (!isComboLocked()) {
      const el = recognizeElement(allPoints);
      if (el && ELEMENTS[el]) {
        // Controlla se questo elemento è compatibile con le combo possibili
        if (!isElementCompatible(el)) {
          flashRejected();
          setStatus('Elemento incompatibile — spento', true);
          setTimeout(() => setStatus('Aggiungi altro o casta  ○ |  /  —', false), 1800);
          hasDrawn = false;
          return;
        }
        comboChain.push(el);
        detectedElement = el;
        applyStrokeStyle(ELEMENTS[el].color);
        updateBadge();
        // Controlla se ora è bloccata
        if (isComboLocked()) {
          setStatus('Casta la magia  ○ |  /  —', false);
        } else {
          setStatus('Aggiungi altro o casta  ○ |  /  —', false);
        }
        setTimeout(() => {
          dctx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
          allPoints = []; allStrokes = [];
        }, 350);
        hasDrawn = false;
        return;
      }
    }
    // Prova modo (cast)
    const mode = recognizeMode(allPoints);
    if (mode && MODE_LABELS[mode]) {
      const s = getStats(allPoints);
      lastLineAngle = s ? s.mainAngle : 0;
      appState = 'SHOWING';
      // Determina cosa castare: combo o elemento singolo
      const combo = matchCombo(comboChain);
      if (combo) {
        showComboEffect(combo, mode);
      } else {
        showEffect(detectedElement, mode);
      }
      return;
    }
    // Né elemento né modo
    setStatus('Non riconosciuto — riprova', true);
    setTimeout(() => setStatus('Aggiungi altro o casta  ○ |  /  —', false), 2200);
    allPoints = []; allStrokes = [];
    hasDrawn = false;
  }
}

let lastLineAngle = 0;

function setStatus(msg, isError) {
  statusEl.textContent = msg;
  statusEl.classList.toggle('error', !!isError);
}

// ─── Effetti visivi ───────────────────────────────────────────────────────────
function showEffect(element, mode) {
  const info = ELEMENTS[element];
  dctx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
  badgeEl.classList.remove('visible');
  setStatus('Tocca per ricominciare', false);
  resultMain.textContent = info.name;
  resultMain.style.color = info.color;
  resultSub.textContent  = '✦ '+MODE_LABELS[mode]+' ✦';
  resultSub.style.color  = info.color;
  resultOverlay.classList.add('visible');
  tapHint.className=''; void tapHint.offsetWidth; tapHint.className='show';
  if (animId) { cancelAnimationFrame(animId); animId=null; }
  if (mode==='SFERA') animateSfera(element, info);
  else animateRaggio(element, mode, info);
  const handler = (e) => {
    e.preventDefault(); resetAll();
    drawCanvas.removeEventListener('click', handler);
    drawCanvas.removeEventListener('touchend', handler);
  };
  setTimeout(() => {
    drawCanvas.addEventListener('click', handler);
    drawCanvas.addEventListener('touchend', handler);
  }, 700);
}

const rgb = (info, a) => `rgba(${info.glow[0]},${info.glow[1]},${info.glow[2]},${a})`;

function animateSfera(element, info) {
  const W=effectCanvas.width, H=effectCanvas.height, cx=W/2, cy=H/2;
  let t=0;
  const particles = Array.from({length:110}, ()=>({
    angle:Math.random()*Math.PI*2, tilt:Math.random()*Math.PI*2,
    speed:0.007+Math.random()*0.018, r:88+Math.random()*55,
    sz:1.2+Math.random()*3.2, alpha:0.35+Math.random()*0.55, phase:Math.random()*Math.PI*2,
  }));
  function frame() {
    ectx.clearRect(0,0,W,H); t++;
    const gR=165+Math.sin(t*0.035)*22;
    const g=ectx.createRadialGradient(cx,cy,0,cx,cy,gR);
    g.addColorStop(0,rgb(info,0.38)); g.addColorStop(0.5,rgb(info,0.13)); g.addColorStop(1,rgb(info,0));
    ectx.fillStyle=g; ectx.beginPath(); ectx.arc(cx,cy,gR,0,Math.PI*2); ectx.fill();
    const s=ectx.createRadialGradient(cx-20,cy-20,4,cx,cy,74);
    s.addColorStop(0,'rgba(255,255,255,0.96)'); s.addColorStop(0.18,rgb(info,0.92));
    s.addColorStop(0.65,rgb(info,0.52)); s.addColorStop(1,rgb(info,0.08));
    ectx.fillStyle=s; ectx.beginPath(); ectx.arc(cx,cy,74,0,Math.PI*2); ectx.fill();
    if(element==='FUOCO'){
      for(let i=0;i<7;i++){
        const fx=cx+(Math.random()-0.5)*82,fy=cy-25-Math.random()*95;
        const fg=ectx.createRadialGradient(fx,fy,0,fx,fy,16+Math.random()*16);
        fg.addColorStop(0,'rgba(255,230,55,0.72)'); fg.addColorStop(1,'transparent');
        ectx.fillStyle=fg; ectx.beginPath(); ectx.arc(fx,fy,16+Math.random()*16,0,Math.PI*2); ectx.fill();
      }
    } else if(element==='GHIACCIO'){
      for(let i=0;i<6;i++){
        const a=(i/6)*Math.PI*2+t*0.009,r=52+Math.sin(t*0.038+i)*9;
        ectx.save(); ectx.translate(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
        ectx.rotate(a+t*0.016); ectx.fillStyle='rgba(200,240,255,0.78)';
        ectx.beginPath(); ectx.moveTo(0,-11); ectx.lineTo(4,0); ectx.lineTo(0,11); ectx.lineTo(-4,0);
        ectx.closePath(); ectx.fill(); ectx.restore();
      }
    } else if(element==='OMBRA'){
      for(let i=0;i<9;i++){
        const a=(i/9)*Math.PI*2+t*0.022,l=68+Math.sin(t*0.06+i*1.4)*26;
        ectx.strokeStyle=rgb(info,0.42); ectx.lineWidth=2; ectx.beginPath();
        ectx.moveTo(cx,cy); ectx.lineTo(cx+Math.cos(a)*l,cy+Math.sin(a)*l); ectx.stroke();
      }
    } else if(element==='ARIA'){
      ectx.save(); ectx.translate(cx,cy); ectx.rotate(t*0.022);
      for(let i=0;i<3;i++){
        ectx.strokeStyle=rgb(info,0.28-i*0.07); ectx.lineWidth=2;
        ectx.beginPath(); ectx.arc(0,0,56+i*22,0,Math.PI*1.75); ectx.stroke();
      }
      ectx.restore();
    } else if(element==='LUCE'){
      for(let i=0;i<8;i++){
        const a=(i/8)*Math.PI*2+t*0.012,l=82+Math.sin(t*0.05+i)*22;
        ectx.strokeStyle='rgba(255,255,180,0.22)'; ectx.lineWidth=1.5;
        ectx.beginPath();
        ectx.moveTo(cx+Math.cos(a)*74,cy+Math.sin(a)*74);
        ectx.lineTo(cx+Math.cos(a)*l,cy+Math.sin(a)*l); ectx.stroke();
      }
    } else if(element==='ERBA'){
      // Spighe d'erba che oscillano attorno alla sfera
      for(let i=0;i<12;i++){
        const a=(i/12)*Math.PI*2+t*0.008;
        const r=68+Math.sin(t*0.05+i*0.8)*12;
        const sway=Math.sin(t*0.04+i*1.1)*0.3;
        ectx.save();
        ectx.translate(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
        ectx.rotate(a+Math.PI/2+sway);
        ectx.strokeStyle=rgb(info,0.65); ectx.lineWidth=1.5;
        ectx.beginPath(); ectx.moveTo(0,0); ectx.lineTo(0,-16);
        ectx.stroke();
        // punta foglia
        ectx.fillStyle=rgb(info,0.55);
        ectx.beginPath(); ectx.ellipse(0,-18,3,5,0,0,Math.PI*2);
        ectx.fill();
        ectx.restore();
      }
    }
    particles.forEach(p=>{
      p.angle+=p.speed;
      const ox=Math.cos(p.angle)*p.r,oy=Math.sin(p.angle)*p.r*Math.sin(p.tilt);
      ectx.fillStyle=rgb(info,p.alpha*(0.65+Math.sin(t*0.05+p.phase)*0.35));
      ectx.beginPath(); ectx.arc(cx+ox,cy+oy,p.sz,0,Math.PI*2); ectx.fill();
    });
    if(element==='LUCE'){
      for(let i=0;i<5;i++){
        const sx=cx+(Math.random()-0.5)*270,sy=cy+(Math.random()-0.5)*270;
        ectx.fillStyle='rgba(255,255,210,0.88)';
        ectx.beginPath(); ectx.arc(sx,sy,0.5+Math.random()*1.8,0,Math.PI*2); ectx.fill();
      }
    }
    animId=requestAnimationFrame(frame);
  }
  frame();
}

function animateRaggio(element, mode, info) {
  const W=effectCanvas.width, H=effectCanvas.height;
  let t=0;

  // ── FIX: usa l'angolo reale della linea disegnata ──
  // Calcola punto di partenza e fine in base all'angolo reale (lastLineAngle)
  // partendo dal centro dello schermo, esteso fino ai bordi
  const cx=W/2, cy=H/2;
  const angle = lastLineAngle;
  const dx = Math.cos(angle), dy = Math.sin(angle);

  // Estende la linea fino ai bordi del canvas nei due sensi
  function rayToBorder(ox, oy, vx, vy) {
    // Interseca con i 4 bordi del canvas e prende il t minimo positivo
    const candidates = [];
    if (vx !== 0) {
      candidates.push((vx > 0 ? W - ox : -ox) / vx);
    }
    if (vy !== 0) {
      candidates.push((vy > 0 ? H - oy : -oy) / vy);
    }
    const tMax = Math.min(...candidates.filter(v=>v>0));
    return { x: ox + vx*tMax, y: oy + vy*tMax };
  }

  const p1 = rayToBorder(cx, cy, -dx, -dy);
  const p2 = rayToBorder(cx, cy,  dx,  dy);
  const bx1=p1.x, by1=p1.y, bx2=p2.x, by2=p2.y;

  const len=Math.hypot(bx2-bx1,by2-by1);
  const ndx=(bx2-bx1)/len, ndy=(by2-by1)/len;
  const px=-ndy, py=ndx; // perpendicolare

  function frame(){
    ectx.clearRect(0,0,W,H); t++;
    const pulse=0.78+Math.sin(t*0.09)*0.22;
    [{w:90*pulse,a:0.035},{w:45*pulse,a:0.075},{w:20*pulse,a:0.17},{w:7,a:0.58*pulse},{w:2,a:0.96}].forEach(({w,a})=>{
      ectx.save();
      ectx.strokeStyle=w>9?rgb(info,a):`rgba(255,255,255,${a})`;
      ectx.lineWidth=w; ectx.lineCap='butt';
      ectx.shadowBlur=w>7?22:8; ectx.shadowColor=rgb(info,1);
      ectx.beginPath(); ectx.moveTo(bx1,by1); ectx.lineTo(bx2,by2);
      ectx.stroke(); ectx.restore();
    });
    for(let i=0;i<28;i++){
      const pr=((t*4.5+i*(len/28))%len);
      const bpx=bx1+ndx*pr+(Math.random()-0.5)*28,bpy=by1+ndy*pr+(Math.random()-0.5)*28;
      ectx.fillStyle=rgb(info,0.45+Math.random()*0.5);
      ectx.beginPath(); ectx.arc(bpx,bpy,1.2+Math.random()*3,0,Math.PI*2); ectx.fill();
    }
    if(element==='FUOCO'){
      for(let i=0;i<9;i++){
        const pr=Math.random()*len;
        const fpx=bx1+ndx*pr+px*(Math.random()-0.5)*32,fpy=by1+ndy*pr+py*(Math.random()-0.5)*32;
        const fg=ectx.createRadialGradient(fpx,fpy,0,fpx,fpy,13+Math.random()*14);
        fg.addColorStop(0,'rgba(255,215,50,0.72)'); fg.addColorStop(1,'transparent');
        ectx.fillStyle=fg; ectx.beginPath(); ectx.arc(fpx,fpy,13+Math.random()*14,0,Math.PI*2); ectx.fill();
      }
    } else if(element==='GHIACCIO'){
      for(let i=0;i<7;i++){
        const pr=Math.random()*len,ipx=bx1+ndx*pr,ipy=by1+ndy*pr;
        ectx.save(); ectx.translate(ipx,ipy); ectx.rotate(t*0.04+i*0.9);
        ectx.fillStyle='rgba(200,240,255,0.72)';
        ectx.beginPath(); ectx.moveTo(0,-10); ectx.lineTo(3.5,0); ectx.lineTo(0,10); ectx.lineTo(-3.5,0);
        ectx.closePath(); ectx.fill(); ectx.restore();
      }
    } else if(element==='OMBRA'){
      for(let i=0;i<6;i++){
        const pr=((t*2.8+i*len/6)%len),opx=bx1+ndx*pr,opy=by1+ndy*pr;
        const wl=24+Math.sin(t*0.11+i)*11;
        ectx.strokeStyle=rgb(info,0.55); ectx.lineWidth=1.5;
        ectx.beginPath(); ectx.moveTo(opx+px*wl,opy+py*wl); ectx.lineTo(opx-px*wl,opy-py*wl); ectx.stroke();
      }
    } else if(element==='ARIA'){
      for(let i=0;i<7;i++){
        const pr=((t*5.5+i*len/7)%len),apx=bx1+ndx*pr,apy=by1+ndy*pr;
        ectx.strokeStyle=rgb(info,0.38); ectx.lineWidth=1;
        ectx.beginPath(); ectx.arc(apx,apy,9+Math.sin(t*0.13+i)*6,0,Math.PI*2); ectx.stroke();
      }
    } else if(element==='LUCE'){
      for(let i=0;i<6;i++){
        const pr=Math.random()*len;
        const lpx=bx1+ndx*pr+(Math.random()-0.5)*22,lpy=by1+ndy*pr+(Math.random()-0.5)*22;
        ectx.fillStyle='rgba(255,255,200,0.9)';
        ectx.beginPath(); ectx.arc(lpx,lpy,0.4+Math.random()*2,0,Math.PI*2); ectx.fill();
      }
    } else if(element==='ERBA'){
      // Fili d'erba lungo il raggio
      for(let i=0;i<10;i++){
        const pr=Math.random()*len;
        const side=(Math.random()>0.5?1:-1)*(8+Math.random()*20);
        const gpx=bx1+ndx*pr+px*side, gpy=by1+ndy*pr+py*side;
        const sway=Math.sin(t*0.04+i*1.3)*6;
        ectx.strokeStyle=rgb(info,0.55+Math.random()*0.35); ectx.lineWidth=1.2;
        ectx.beginPath();
        ectx.moveTo(gpx,gpy);
        ectx.quadraticCurveTo(gpx+px*sway,gpy+py*sway,gpx+px*20+ndx*4,gpy+py*20+ndy*4);
        ectx.stroke();
      }
    }
    animId=requestAnimationFrame(frame);
  }
  frame();
}

// ─── Effetto visivo combo ─────────────────────────────────────────────────────
function showComboEffect(combo, mode) {
  dctx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
  badgeEl.classList.remove('visible');
  setStatus('Tocca per ricominciare', false);

  resultMain.style.color = combo.color;

  resultOverlay.classList.add('visible');
  tapHint.className=''; void tapHint.offsetWidth; tapHint.className='show';
  if (animId) { cancelAnimationFrame(animId); animId=null; }

  else animateComboRaggio(combo, mode);

    drawCanvas.removeEventListener('touchend', handler);
  };

    drawCanvas.addEventListener('click', handler);
    drawCanvas.addEventListener('touchend', handler);

}

function animateComboSfera(combo) {
  const W=effectCanvas.width, H=effectCanvas.height, cx=W/2, cy=H/2;
  let t=0;
  const [r,g,b2] = combo.glow;
  const rgbC = (a) => `rgba(${r},${g},${b2},${a})`;
  const particles = Array.from({length:130}, ()=>({
    angle:Math.random()*Math.PI*2, tilt:Math.random()*Math.PI*2,
    speed:0.006+Math.random()*0.02, radius:80+Math.random()*65,
    sz:1.2+Math.random()*3.5, alpha:0.3+Math.random()*0.6, phase:Math.random()*Math.PI*2,
  }));

  function frame() {
    ectx.clearRect(0,0,W,H); t++;
    const gR=170+Math.sin(t*0.03)*25;
    const grad=ectx.createRadialGradient(cx,cy,0,cx,cy,gR);
    grad.addColorStop(0,rgbC(0.42)); grad.addColorStop(0.5,rgbC(0.14)); grad.addColorStop(1,rgbC(0));
    ectx.fillStyle=grad; ectx.beginPath(); ectx.arc(cx,cy,gR,0,Math.PI*2); ectx.fill();

    const sg=ectx.createRadialGradient(cx-20,cy-20,4,cx,cy,74);
    sg.addColorStop(0,'rgba(255,255,255,0.96)'); sg.addColorStop(0.2,rgbC(0.9));
    sg.addColorStop(0.65,rgbC(0.5)); sg.addColorStop(1,rgbC(0.06));
    ectx.fillStyle=sg; ectx.beginPath(); ectx.arc(cx,cy,74,0,Math.PI*2); ectx.fill();

    // Effetti specifici per combo
    if (combo.name === 'ACQUA') {
      // Onde concentriche
      for(let i=0;i<4;i++){
        const wr=(t*1.2+i*28)%140;
        ectx.strokeStyle=rgbC(0.6*(1-wr/140)); ectx.lineWidth=2;
        ectx.beginPath(); ectx.arc(cx,cy,wr,0,Math.PI*2); ectx.stroke();
      }
    } else if (combo.name === 'FUMOGENA') {
      // Nuvole di fumo che si espandono
      for(let i=0;i<8;i++){
        const a=(i/8)*Math.PI*2+t*0.008;
        const dist=55+Math.sin(t*0.03+i)*18;
        const sr=22+Math.sin(t*0.05+i*1.3)*8;
        const sg2=ectx.createRadialGradient(cx+Math.cos(a)*dist,cy+Math.sin(a)*dist,0,cx+Math.cos(a)*dist,cy+Math.sin(a)*dist,sr);
        sg2.addColorStop(0,rgbC(0.38)); sg2.addColorStop(1,rgbC(0));
        ectx.fillStyle=sg2; ectx.beginPath(); ectx.arc(cx+Math.cos(a)*dist,cy+Math.sin(a)*dist,sr,0,Math.PI*2); ectx.fill();
      }
    } else if (combo.name === 'FULMINE') {
      // Scariche elettriche
      if(t%3===0){
        for(let i=0;i<3;i++){
          const a=Math.random()*Math.PI*2;
          const l=50+Math.random()*60;
          ectx.strokeStyle=`rgba(255,255,180,${0.5+Math.random()*0.5})`;
          ectx.lineWidth=1+Math.random()*2;
          ectx.beginPath(); ectx.moveTo(cx,cy);
          let lx=cx,ly=cy;
          for(let s=0;s<4;s++){
            lx+=Math.cos(a+(Math.random()-0.5)*1.2)*(l/4);
            ly+=Math.sin(a+(Math.random()-0.5)*1.2)*(l/4);
            ectx.lineTo(lx,ly);
          }
          ectx.stroke();
        }
      }
    } else if (combo.name === 'FANGO') {
      // Gocce che cadono/spruzzano
      for(let i=0;i<6;i++){
        const a=(i/6)*Math.PI*2+t*0.01;
        const dist=50+Math.random()*40;
        ectx.fillStyle=rgbC(0.55);
        ectx.beginPath(); ectx.ellipse(cx+Math.cos(a)*dist,cy+Math.sin(a)*dist,6,9,a,0,Math.PI*2); ectx.fill();
      }
    } else if (combo.name === 'ROCCIA') {
      // Frammenti angolosi che orbitano
      for(let i=0;i<8;i++){
        const a=(i/8)*Math.PI*2+t*0.007;
        const dist=58+Math.sin(t*0.04+i)*12;
        ectx.save(); ectx.translate(cx+Math.cos(a)*dist,cy+Math.sin(a)*dist);
        ectx.rotate(a+t*0.01);
        ectx.fillStyle=rgbC(0.7);
        ectx.beginPath(); ectx.moveTo(0,-10); ectx.lineTo(8,4); ectx.lineTo(-2,10); ectx.lineTo(-8,2); ectx.closePath(); ectx.fill();
        ectx.restore();
      }
    } else if (combo.name === 'LAVA') {
      // Bolle incandescenti
      for(let i=0;i<7;i++){
        const fx=cx+(Math.random()-0.5)*100,fy=cy-20-Math.random()*110;
        const fg=ectx.createRadialGradient(fx,fy,0,fx,fy,18+Math.random()*18);
        fg.addColorStop(0,'rgba(255,200,50,0.8)'); fg.addColorStop(0.5,rgbC(0.6)); fg.addColorStop(1,'transparent');
        ectx.fillStyle=fg; ectx.beginPath(); ectx.arc(fx,fy,18+Math.random()*18,0,Math.PI*2); ectx.fill();
      }
    }

    particles.forEach(p=>{
      p.angle+=p.speed;
      const ox=Math.cos(p.angle)*p.radius, oy=Math.sin(p.angle)*p.radius*Math.sin(p.tilt);
      ectx.fillStyle=rgbC(p.alpha*(0.6+Math.sin(t*0.05+p.phase)*0.4));
      ectx.beginPath(); ectx.arc(cx+ox,cy+oy,p.sz,0,Math.PI*2); ectx.fill();
    });
    animId=requestAnimationFrame(frame);
  }
  frame();
}

function animateComboRaggio(combo, mode) {
  const W=effectCanvas.width, H=effectCanvas.height, cx=W/2, cy=H/2;
  let t=0;
  const [r,g,b2] = combo.glow;
  const rgbC = (a) => `rgba(${r},${g},${b2},${a})`;
  const angle=lastLineAngle, dx=Math.cos(angle), dy=Math.sin(angle);

  function rayToBorder(ox,oy,vx,vy){
    const candidates=[];
    if(vx!==0) candidates.push((vx>0?W-ox:-ox)/vx);
    if(vy!==0) candidates.push((vy>0?H-oy:-oy)/vy);
    const tMax=Math.min(...candidates.filter(v=>v>0));
    return {x:ox+vx*tMax,y:oy+vy*tMax};
  }
  const p1=rayToBorder(cx,cy,-dx,-dy), p2=rayToBorder(cx,cy,dx,dy);
  const bx1=p1.x,by1=p1.y,bx2=p2.x,by2=p2.y;
  const len=Math.hypot(bx2-bx1,by2-by1);
  const ndx=(bx2-bx1)/len, ndy=(by2-by1)/len;
  const px=-ndy, py=ndx;

  function frame(){
    ectx.clearRect(0,0,W,H); t++;
    const pulse=0.78+Math.sin(t*0.09)*0.22;
    [{w:90*pulse,a:0.03},{w:45*pulse,a:0.07},{w:20*pulse,a:0.16},{w:7,a:0.55*pulse},{w:2,a:0.96}].forEach(({w,a})=>{
      ectx.save();
      ectx.strokeStyle=w>9?rgbC(a):`rgba(255,255,255,${a})`;
      ectx.lineWidth=w; ectx.lineCap='butt';
      ectx.shadowBlur=w>7?22:8; ectx.shadowColor=rgbC(1);
      ectx.beginPath(); ectx.moveTo(bx1,by1); ectx.lineTo(bx2,by2);
      ectx.stroke(); ectx.restore();
    });
    for(let i=0;i<28;i++){
      const pr=((t*4.5+i*(len/28))%len);
      const bpx=bx1+ndx*pr+(Math.random()-0.5)*28,bpy=by1+ndy*pr+(Math.random()-0.5)*28;
      ectx.fillStyle=rgbC(0.45+Math.random()*0.5);
      ectx.beginPath(); ectx.arc(bpx,bpy,1.2+Math.random()*3,0,Math.PI*2); ectx.fill();
    }

    if (combo.name === 'ACQUA') {
      for(let i=0;i<8;i++){
        const pr=((t*3+i*len/8)%len),wpx=bx1+ndx*pr,wpy=by1+ndy*pr;
        ectx.strokeStyle=rgbC(0.4); ectx.lineWidth=1.5;
        ectx.beginPath(); ectx.arc(wpx,wpy,8+Math.sin(t*0.1+i)*5,0,Math.PI*2); ectx.stroke();
      }
    } else if (combo.name === 'FUMOGENA') {
      for(let i=0;i<8;i++){
        const pr=Math.random()*len;
        const spx=bx1+ndx*pr+px*(Math.random()-0.5)*60,spy=by1+ndy*pr+py*(Math.random()-0.5)*60;
        const sg=ectx.createRadialGradient(spx,spy,0,spx,spy,20+Math.random()*20);
        sg.addColorStop(0,rgbC(0.3)); sg.addColorStop(1,rgbC(0));
        ectx.fillStyle=sg; ectx.beginPath(); ectx.arc(spx,spy,20+Math.random()*20,0,Math.PI*2); ectx.fill();
      }
    } else if (combo.name === 'FULMINE') {
      if(t%2===0){
        const pr=Math.random()*len;
        const fpx=bx1+ndx*pr,fpy=by1+ndy*pr;
        ectx.strokeStyle=`rgba(255,255,220,0.9)`; ectx.lineWidth=1.5;
        ectx.beginPath(); ectx.moveTo(fpx+px*(Math.random()-0.5)*50,fpy+py*(Math.random()-0.5)*50);
        ectx.lineTo(fpx,fpy); ectx.stroke();
      }
    } else if (combo.name === 'FANGO') {
      for(let i=0;i<6;i++){
        const pr=Math.random()*len;
        const mpx=bx1+ndx*pr+px*(Math.random()-0.5)*28,mpy=by1+ndy*pr+py*(Math.random()-0.5)*28;
        ectx.fillStyle=rgbC(0.6);
        ectx.beginPath(); ectx.ellipse(mpx,mpy,5,8,Math.random()*Math.PI,0,Math.PI*2); ectx.fill();
      }
    } else if (combo.name === 'ROCCIA') {
      for(let i=0;i<5;i++){
        const pr=Math.random()*len;
        const rpx=bx1+ndx*pr,rpy=by1+ndy*pr;
        ectx.save(); ectx.translate(rpx,rpy); ectx.rotate(t*0.03+i);
        ectx.fillStyle=rgbC(0.7);
        ectx.beginPath(); ectx.moveTo(0,-9); ectx.lineTo(7,3); ectx.lineTo(-2,9); ectx.lineTo(-7,2); ectx.closePath(); ectx.fill();
        ectx.restore();
      }
    } else if (combo.name === 'LAVA') {
      for(let i=0;i<9;i++){
        const pr=Math.random()*len;
        const lpx=bx1+ndx*pr+px*(Math.random()-0.5)*35,lpy=by1+ndy*pr+py*(Math.random()-0.5)*35;
        const lg=ectx.createRadialGradient(lpx,lpy,0,lpx,lpy,14+Math.random()*14);
        lg.addColorStop(0,'rgba(255,210,50,0.8)'); lg.addColorStop(0.5,rgbC(0.55)); lg.addColorStop(1,'transparent');
        ectx.fillStyle=lg; ectx.beginPath(); ectx.arc(lpx,lpy,14+Math.random()*14,0,Math.PI*2); ectx.fill();
      }
    }
    animId=requestAnimationFrame(frame);
  }
  frame();
}


function resetAll() {
  if(animId){ cancelAnimationFrame(animId); animId=null; }
  appState='WAITING_ELEMENT'; detectedElement=null; hasDrawn=false;
  allPoints=[]; allStrokes=[]; comboChain=[];
  dctx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
  ectx.clearRect(0,0,effectCanvas.width,effectCanvas.height);
  applyStrokeStyle('rgba(255,255,255,0.92)');
  resultOverlay.classList.remove('visible');
  badgeEl.classList.remove('visible');
  comboChainEl.textContent='';
  tapHint.className='';
  setStatus('Disegna il simbolo di un elemento', false);
}
clearBtn.addEventListener('click', e=>{ e.stopPropagation(); resetAll(); });
</script>
